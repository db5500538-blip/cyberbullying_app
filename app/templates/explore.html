<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ethoria · Explore</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d14;--card:#13131e;--border:#1c1c2e;--purple:#7c3aed;--purple-light:#a855f7;--text:#e2e8f0;--muted:#64748b;--nav-h:60px;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(13,13,20,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.nav-logo{font-size:1.3rem;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,var(--purple-light),#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.content{max-width:900px;margin:0 auto;padding:calc(var(--nav-h) + 24px) 16px 40px}
.explore-search{margin-bottom:24px;position:relative}
.explore-search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px 12px 44px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.explore-search input:focus{border-color:var(--purple)}
.explore-search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.grid-post{aspect-ratio:1;background:var(--card);border-radius:4px;overflow:hidden;position:relative;cursor:pointer}
.grid-post img{width:100%;height:100%;object-fit:cover}
.grid-post-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;gap:16px;color:#fff;font-size:.85rem;font-weight:600}
.grid-post:hover .grid-post-overlay{display:flex}
.grid-post-placeholder{width:100%;height:100%;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.8rem}
.section-title{font-size:1rem;font-weight:600;margin-bottom:16px;padding:0 2px}
.users-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;margin-bottom:24px;scrollbar-width:none}
.users-row::-webkit-scrollbar{display:none}
.user-chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .2s;min-width:160px}
.user-chip:hover{border-color:var(--purple)}
.user-chip-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff;flex-shrink:0}
.user-chip-name{font-size:.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-chip-sub{font-size:.72rem;color:var(--muted)}
</style>
</head>
<body>
<nav>
  <div class="nav-logo" onclick="location.href='/home.html'">ETHORIA</div>
  <span style="color:var(--muted);font-size:.9rem">Explore</span>
</nav>
<div class="content">
  <div class="explore-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search people..." oninput="debounceSearch()"/>
  </div>
  <div id="searchResults"></div>
  <div class="section-title">Discover People</div>
  <div class="users-row" id="usersRow"></div>
  <div class="section-title">All Posts</div>
  <div class="grid" id="exploreGrid"></div>
</div>
<script>
function getToken(){return localStorage.getItem('token');}
function authHeaders(){return {'Content-Type':'application/json','Authorization':`Bearer ${getToken()}`};}
if(!getToken()){location.href='/login.html';}
let searchTimeout = null;

async function loadExplore(){
  const r = await fetch('/api/posts/explore',{headers:authHeaders(),credentials:'include'});
  const posts = await r.json();
  const grid = document.getElementById('exploreGrid');
  if(!posts.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">No posts yet</div>';return;}
  grid.innerHTML = posts.map(p=>`
    <div class="grid-post" onclick="location.href='/profile.html?user=${p.author.username}'">
      ${p.image_url?`<img src="${p.image_url}" loading="lazy"/>`:`<div class="grid-post-placeholder">📝</div>`}
      <div class="grid-post-overlay"><span>❤️ ${p.likes}</span><span>💬 ${p.comments.length}</span></div>
    </div>`).join('');
  
  // Load users
  const users = [...new Map(posts.map(p=>[p.author._id,p.author])).values()];
  document.getElementById('usersRow').innerHTML = users.slice(0,10).map(u=>`
    <div class="user-chip" onclick="location.href='/profile.html?user=${u.username}'">
      <div class="user-chip-avatar">${u.username[0].toUpperCase()}</div>
      <div><div class="user-chip-name">${u.username}</div><div class="user-chip-sub">View profile</div></div>
    </div>`).join('');
}

function debounceSearch(){
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch,400);
}

async function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('searchResults');
  if(!q){el.innerHTML='';return;}
  const r = await fetch(`/api/users/search?q=${encodeURIComponent(q)}`,{headers:authHeaders(),credentials:'include'});
  const users = await r.json();
  if(!users.length){el.innerHTML='<div style="color:var(--muted);font-size:.85rem;margin-bottom:16px">No users found</div>';return;}
  el.innerHTML = `<div style="margin-bottom:20px">${users.map(u=>`
    <div class="user-chip" style="display:inline-flex;margin:0 8px 8px 0" onclick="location.href='/profile.html?user=${u.username}'">
      <div class="user-chip-avatar">${u.username[0].toUpperCase()}</div>
      <div><div class="user-chip-name">${u.username}</div><div class="user-chip-sub">${u.followers_count} followers</div></div>
    </div>`).join('')}</div>`;
}

loadExplore();
</script>
</body>
</html>
