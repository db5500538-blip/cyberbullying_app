<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ethoria · Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d14;--card:#13131e;--border:#1c1c2e;--purple:#7c3aed;--purple-light:#a855f7;--text:#e2e8f0;--muted:#64748b;--nav-h:60px;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(13,13,20,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.nav-logo{font-size:1.3rem;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,var(--purple-light),#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.back-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 14px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem}
.content{max-width:700px;margin:0 auto;padding:calc(var(--nav-h) + 32px) 16px 40px}
.profile-header{display:flex;align-items:center;gap:32px;margin-bottom:32px}
.profile-avatar-wrap{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.profile-avatar-wrap img{width:100%;height:100%;object-fit:cover}
.profile-info{flex:1}
.profile-username{font-size:1.3rem;font-weight:700;margin-bottom:6px}
.profile-stats{display:flex;gap:24px;margin-bottom:10px}
.stat{text-align:center}
.stat-num{font-size:1.1rem;font-weight:700}
.stat-label{font-size:.75rem;color:var(--muted)}
.profile-bio{font-size:.9rem;color:var(--muted);line-height:1.5}
.profile-actions{display:flex;gap:10px;margin-top:12px}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-light));border:none;border-radius:10px;color:#fff;padding:9px 22px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600}
.btn-outline{background:none;border:1px solid var(--border);border-radius:10px;color:var(--text);padding:9px 22px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem}
.btn-outline:hover{border-color:var(--purple);color:var(--purple-light)}
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:8px}
.grid-post{aspect-ratio:1;background:var(--card);border-radius:4px;overflow:hidden;position:relative;cursor:pointer}
.grid-post img{width:100%;height:100%;object-fit:cover}
.grid-post-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;gap:16px;color:#fff;font-size:.85rem;font-weight:600}
.grid-post:hover .grid-post-overlay{display:flex}
.grid-post-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.8rem}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e1e2e;border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.toast.success{border-color:#22c55e;color:#22c55e}.toast.error{border-color:#ef4444;color:#ef4444}
</style>
</head>
<body>
<nav>
  <div class="nav-logo" onclick="location.href='/home.html'">ETHORIA</div>
  <button class="back-btn" onclick="history.back()">← Back</button>
</nav>
<div class="content">
  <div class="profile-header">
    <div class="profile-avatar-wrap" id="profileAvatar"></div>
    <div class="profile-info">
      <div class="profile-username" id="profileUsername">Loading...</div>
      <div class="profile-stats">
        <div class="stat"><div class="stat-num" id="statPosts">0</div><div class="stat-label">posts</div></div>
        <div class="stat"><div class="stat-num" id="statFollowers">0</div><div class="stat-label">followers</div></div>
        <div class="stat"><div class="stat-num" id="statFollowing">0</div><div class="stat-label">following</div></div>
      </div>
      <div class="profile-bio" id="profileBio"></div>
      <div class="profile-actions" id="profileActions"></div>
    </div>
  </div>
  <hr class="divider"/>
  <div class="posts-grid" id="postsGrid"></div>
</div>
<div class="toast" id="toast"></div>
<script>
function getToken(){return localStorage.getItem('token');}
function authHeaders(){return {'Content-Type':'application/json','Authorization':`Bearer ${getToken()}`};}
const params = new URLSearchParams(location.search);
const targetUser = params.get('user');
let currentUser = JSON.parse(localStorage.getItem('user')||'{}');

async function loadProfile(){
  if(!getToken()){location.href='/login.html';return;}
  const r = await fetch(`/api/users/${targetUser}`,{headers:authHeaders(),credentials:'include'});
  if(!r.ok){document.getElementById('profileUsername').textContent='User not found';return;}
  const {user,posts} = await r.json();

  const avatarEl = document.getElementById('profileAvatar');
  if(user.avatar){avatarEl.innerHTML=`<img src="${user.avatar}" alt=""/>`;}
  else{avatarEl.textContent=user.username[0].toUpperCase();}

  document.getElementById('profileUsername').textContent = user.username;
  document.getElementById('profileBio').textContent = user.bio || '';
  document.getElementById('statPosts').textContent = posts.length;
  document.getElementById('statFollowers').textContent = user.followers_count;
  document.getElementById('statFollowing').textContent = user.following_count;
  document.title = `Ethoria · ${user.username}`;

  const actions = document.getElementById('profileActions');
  if(user._id === currentUser._id){
    actions.innerHTML = `<button class="btn-outline" onclick="location.href='/home.html'">Edit Profile</button>`;
  } else {
    actions.innerHTML = `<button class="btn-primary" id="followBtn" onclick="followUser('${user._id}')">${user.is_following?'Following':'Follow'}</button>`;
  }

  const grid = document.getElementById('postsGrid');
  if(!posts.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);font-size:.9rem">No posts yet</div>';return;}
  grid.innerHTML = posts.map(p => `
    <div class="grid-post">
      ${p.image_url ? `<img src="${p.image_url}" alt="" loading="lazy"/>` : `<div class="grid-post-placeholder">📝</div>`}
      <div class="grid-post-overlay">
        <span>❤️ ${p.likes}</span>
        <span>💬 ${p.comments}</span>
      </div>
    </div>`).join('');
}

async function followUser(userId){
  const r = await fetch(`/api/users/${userId}/follow`,{method:'POST',headers:authHeaders(),credentials:'include'});
  const d = await r.json();
  const btn = document.getElementById('followBtn');
  btn.textContent = d.following ? 'Following' : 'Follow';
  const count = document.getElementById('statFollowers');
  count.textContent = parseInt(count.textContent) + (d.following ? 1 : -1);
  showToast(d.following ? 'Following!' : 'Unfollowed', 'success');
}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.className='toast',2500);
}

loadProfile();
</script>
</body>
</html>
