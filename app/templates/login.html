<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ethoria · Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--purple:#7c3aed;--purple-light:#a855f7;
    --text:#e2e8f0;--muted:#64748b;--danger:#ef4444;--success:#22c55e;
  }
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
  .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.25}
  .orb1{width:400px;height:400px;background:var(--purple);top:-100px;left:-100px}
  .orb2{width:300px;height:300px;background:#1d4ed8;bottom:-80px;right:-80px}
  .card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 25px 60px rgba(0,0,0,.5)}
  .logo{text-align:center;margin-bottom:32px}
  .logo h1{font-size:2rem;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,var(--purple-light),#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo p{color:var(--muted);font-size:.85rem;margin-top:4px}
  .form-group{margin-bottom:18px}
  label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  input{width:100%;background:#0f0f1a;border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--purple)}
  .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--purple),var(--purple-light));border:none;border-radius:10px;color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s}
  .btn:hover{opacity:.9}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none}
  .msg.error{background:rgba(239,68,68,.1);border:1px solid var(--danger);color:var(--danger);display:block}
  .msg.success{background:rgba(34,197,94,.1);border:1px solid var(--success);color:var(--success);display:block}
  .footer-link{text-align:center;margin-top:20px;font-size:.85rem;color:var(--muted)}
  .footer-link a{color:var(--purple-light);text-decoration:none}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="card">
  <div class="logo">
    <h1>ETHORIA</h1>
    <p>Welcome back 👋</p>
  </div>
  <div class="msg" id="msg"></div>
  <div class="form-group">
    <label>Username or Email</label>
    <input type="text" id="identifier" placeholder="your_username" autocomplete="username"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  <div class="footer-link">Don't have an account? <a href="/register.html">Sign up</a></div>
</div>
<script>
async function doLogin(){
  const id=document.getElementById('identifier').value.trim();
  const pw=document.getElementById('password').value;
  const btn=document.getElementById('loginBtn');
  const msg=document.getElementById('msg');
  msg.className='msg'; msg.textContent='';
  if(!id||!pw){showMsg('Please fill in all fields','error');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Signing in...';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({username:id,password:pw})});
    const d=await r.json();
    if(r.ok){
      localStorage.setItem('token',d.token);
      localStorage.setItem('user',JSON.stringify(d.user));
      window.location.href='/home.html';
    } else {showMsg(d.error||'Login failed','error');}
  }catch(e){showMsg('Server error. Try again.','error');}
  btn.disabled=false;btn.innerHTML='Sign In';
}
function showMsg(t,type){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+type;}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
// Redirect if already logged in
if(localStorage.getItem('token'))window.location.href='/home.html';
</script>
</body>
</html>
