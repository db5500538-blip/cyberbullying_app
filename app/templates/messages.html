{% extends 'base.html' %}
{% block content %}
<div style="display:flex; justify-content:center; padding:20px;">
    <div style="width:800px; background:white; border:1px solid #dbdbdb; border-radius:8px; display:flex; height:80vh;">

        <!-- Chat Header -->
        <div style="flex:1; display:flex; flex-direction:column;">
            <div style="padding:15px 20px; border-bottom:1px solid #dbdbdb; display:flex; align-items:center; gap:12px;">
                <i class="fas fa-user-circle" style="font-size:38px; color:#dbdbdb;"></i>
                <div>
                    <div style="font-weight:bold;">{{ other.username }}</div>
                    <div style="font-size:12px; color:#8e8e8e;">Direct Message</div>
                </div>
            </div>

            <!-- Messages -->
            <div id="msgContainer" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;">
                {% for msg in messages %}
                <div style="display:flex; justify-content:{% if msg.sender_id == current_user.id %}flex-end{% else %}flex-start{% endif %};">
                    <div style="max-width:60%; padding:10px 14px; border-radius:18px;
                        background:{% if msg.sender_id == current_user.id %}#0095f6{% else %}#efefef{% endif %};
                        color:{% if msg.sender_id == current_user.id %}white{% else %}#262626{% endif %};
                        font-size:14px;">
                        {{ msg.content }}
                        {% if msg.is_flagged %}
                        <div style="font-size:10px; opacity:0.7; margin-top:3px;">⚠️ Flagged</div>
                        {% endif %}
                    </div>
                </div>
                {% endfor %}
            </div>

            <!-- Message Input -->
            <div style="padding:15px; border-top:1px solid #dbdbdb; display:flex; gap:10px; align-items:center;">
                <input type="text" id="msgInput" placeholder="Message..."
                    style="flex:1; padding:10px 15px; border:1px solid #dbdbdb; border-radius:25px; outline:none; font-size:14px;">
                <button onclick="sendMessage()"
                    style="background:#0095f6; color:white; border:none; padding:9px 18px; border-radius:25px; font-weight:bold; cursor:pointer;">
                    Send
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const receiverId = {{ other.id }};
const msgContainer = document.getElementById('msgContainer');
msgContainer.scrollTop = msgContainer.scrollHeight;

document.getElementById('msgInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
});

function sendMessage() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content) return;
    fetch('/messages/' + receiverId + '/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({content: content})
    })
    .then(r => r.json())
    .then(data => {
        const div = document.createElement('div');
        div.style.cssText = 'display:flex; justify-content:flex-end;';
        div.innerHTML = `<div style="max-width:60%; padding:10px 14px; border-radius:18px; background:#0095f6; color:white; font-size:14px;">
            ${data.content}
            ${data.flagged ? '<div style="font-size:10px; opacity:0.7; margin-top:3px;">⚠️ Flagged</div>' : ''}
        </div>`;
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
        if (data.flagged) {
            alert('⚠️ Warning: Your message contained harmful content and has been reported.');
        }
    });
    input.value = '';
}
</script>
{% endblock %}
