<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ethoria · Home</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d14;--sidebar:#10101a;--card:#13131e;--border:#1c1c2e;
  --purple:#7c3aed;--purple-light:#a855f7;--purple-dim:rgba(124,58,237,.15);
  --text:#e2e8f0;--muted:#64748b;--muted2:#4a5568;--danger:#ef4444;
  --success:#22c55e;--warn:#f59e0b;--nav-h:60px;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(13,13,20,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.nav-logo{font-size:1.3rem;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,var(--purple-light),#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.nav-search{flex:1;max-width:300px;margin:0 24px;position:relative}
.nav-search input{width:100%;background:#0a0a12;border:1px solid var(--border);border-radius:20px;padding:8px 16px 8px 36px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
.nav-search input:focus{border-color:var(--purple)}
.nav-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.nav-icons{display:flex;align-items:center;gap:8px}
.nav-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;position:relative;border:none;background:transparent}
.nav-icon:hover{background:var(--border);color:var(--text)}
.nav-icon.active{color:var(--purple-light)}
.badge{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--purple-light);border-radius:50%;border:2px solid var(--bg)}
.avatar-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--purple);overflow:hidden;cursor:pointer;background:var(--border)}
.avatar-btn img{width:100%;height:100%;object-fit:cover}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr minmax(0,600px) 280px;gap:0;padding-top:var(--nav-h);min-height:100vh}
.left-gap{display:flex;flex-direction:column;align-items:flex-end;padding:24px 16px}
.feed{padding:24px 16px;max-width:600px;width:100%}
.right-panel{padding:24px 16px;border-left:1px solid var(--border)}

/* STORIES */
.stories-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px;overflow:hidden}
.stories-scroll{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none}
.stories-scroll::-webkit-scrollbar{display:none}
.story-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.story-ring{width:58px;height:58px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--purple),#ec4899);position:relative}
.story-ring.seen{background:var(--border)}
.story-ring.add-story{background:var(--border)}
.story-avatar{width:100%;height:100%;border-radius:50%;border:2px solid var(--card);object-fit:cover;background:var(--border)}
.story-add-icon{position:absolute;bottom:0;right:0;width:18px;height:18px;background:var(--purple);border-radius:50%;border:2px solid var(--card);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff}
.story-name{font-size:.7rem;color:var(--muted);max-width:64px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* CREATE POST */
.create-post{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px}
.create-row{display:flex;align-items:center;gap:12px}
.create-avatar{width:38px;height:38px;border-radius:50%;background:var(--border);overflow:hidden;flex-shrink:0}
.create-avatar img{width:100%;height:100%;object-fit:cover}
.create-input{flex:1;background:#0a0a12;border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.9rem;cursor:pointer;outline:none}
.create-input:focus{color:var(--text);border-color:var(--purple)}

/* POST MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:480px;position:relative}
.modal h3{font-size:1.1rem;font-weight:600;margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:4px}
.modal textarea{width:100%;background:#0a0a12;border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.95rem;resize:none;outline:none;min-height:100px;transition:border-color .2s}
.modal textarea:focus{border-color:var(--purple)}
.img-preview{margin-top:12px;border-radius:12px;overflow:hidden;max-height:260px;display:none}
.img-preview img{width:100%;object-fit:cover}
.modal-actions{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.img-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:8px 14px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;display:flex;align-items:center;gap:6px;transition:all .2s}
.img-btn:hover{border-color:var(--purple);color:var(--purple-light)}
.post-btn{background:linear-gradient(135deg,var(--purple),var(--purple-light));border:none;border-radius:8px;color:#fff;padding:9px 22px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;transition:opacity .2s}
.post-btn:hover{opacity:.9}.post-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-badge{display:none;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;font-size:.8rem;margin-top:10px}
.ai-badge.warn{background:rgba(245,158,11,.1);border:1px solid var(--warn);color:var(--warn);display:flex}
.ai-badge.block{background:rgba(239,68,68,.1);border:1px solid var(--danger);color:var(--danger);display:flex}

/* POSTS */
.post-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px;overflow:hidden}
.post-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
.post-author{display:flex;align-items:center;gap:10px;cursor:pointer}
.post-avatar{width:38px;height:38px;border-radius:50%;background:var(--border);object-fit:cover}
.post-author-info{}
.post-username{font-size:.9rem;font-weight:600}
.post-time{font-size:.75rem;color:var(--muted)}
.post-menu{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 8px;font-size:1.1rem;border-radius:6px}
.post-menu:hover{background:var(--border);color:var(--text)}
.post-image{width:100%;max-height:520px;object-fit:cover;display:block}
.post-actions{display:flex;align-items:center;padding:12px 16px;gap:4px}
.action-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:7px;border-radius:8px;display:flex;align-items:center;gap:5px;font-family:'Outfit',sans-serif;font-size:.85rem;transition:all .2s}
.action-btn:hover{background:var(--border);color:var(--text)}
.action-btn.liked{color:#ef4444}
.action-btn svg.liked-icon{fill:#ef4444;stroke:#ef4444}
.save-btn{margin-left:auto}
.save-btn.saved{color:var(--purple-light)}
.post-meta{padding:0 16px 6px}
.likes-count{font-size:.85rem;font-weight:600;margin-bottom:4px}
.caption{font-size:.9rem;line-height:1.5}
.caption span{font-weight:600;margin-right:4px;cursor:pointer}
.comments-section{padding:8px 16px 4px}
.comment-item{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.comment-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border)}
.comment-body{font-size:.85rem;line-height:1.4}
.comment-body strong{margin-right:4px;cursor:pointer}
.view-comments{color:var(--muted);font-size:.82rem;cursor:pointer;margin-bottom:8px;display:block}
.view-comments:hover{color:var(--text)}
.add-comment{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--border)}
.comment-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:.85rem;placeholder:var(--muted)}
.comment-send{background:none;border:none;color:var(--purple-light);cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;opacity:.5;transition:opacity .2s}
.comment-send.active{opacity:1}

/* RIGHT PANEL */
.panel-section{margin-bottom:28px}
.panel-title{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.user-card{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.user-info{display:flex;align-items:center;gap:10px;cursor:pointer}
.user-avatar-sm{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--border)}
.user-name-wrap{}
.user-display{font-size:.85rem;font-weight:600}
.user-sub{font-size:.75rem;color:var(--muted)}
.follow-btn{background:var(--purple-dim);border:1px solid var(--purple);border-radius:8px;color:var(--purple-light);padding:5px 14px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;transition:all .2s}
.follow-btn:hover{background:var(--purple);color:#fff}
.follow-btn.following{background:transparent;border-color:var(--border);color:var(--muted)}
.notif-panel{position:fixed;top:var(--nav-h);right:0;width:320px;background:var(--sidebar);border-left:1px solid var(--border);height:calc(100vh - var(--nav-h));overflow-y:auto;transform:translateX(100%);transition:transform .3s;z-index:99;padding:20px}
.notif-panel.open{transform:translateX(0)}
.notif-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.notif-header h3{font-size:1rem;font-weight:600}
.mark-read{background:none;border:none;color:var(--purple-light);cursor:pointer;font-family:'Outfit',sans-serif;font-size:.8rem}
.notif-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);position:relative}
.notif-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border)}
.notif-body{flex:1;font-size:.83rem;line-height:1.4}
.notif-body strong{font-weight:600}
.notif-time{font-size:.72rem;color:var(--muted);margin-top:2px;display:block}
.notif-dot{width:8px;height:8px;background:var(--purple-light);border-radius:50%;flex-shrink:0}
.notif-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--border)}

/* STORY VIEWER */
.story-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column}
.story-viewer.open{display:flex}
.story-viewer img{max-height:80vh;max-width:400px;border-radius:12px;object-fit:contain}
.story-viewer-close{position:absolute;top:20px;right:20px;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer}
.story-progress{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:360px;height:3px;background:rgba(255,255,255,.3);border-radius:2px}
.story-progress-fill{height:100%;background:#fff;border-radius:2px;animation:storyProg 5s linear forwards}
@keyframes storyProg{from{width:0}to{width:100%}}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e1e2e;border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:340px;text-align:center}
.toast.show{opacity:1}
.toast.warn{border-color:var(--warn);color:var(--warn)}
.toast.error{border-color:var(--danger);color:var(--danger)}
.toast.success{border-color:var(--success);color:var(--success)}

/* SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:40px;color:var(--muted)}
.empty-state p{font-size:.9rem}

/* user profile pic placeholder */
.avatar-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--purple),#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff}

@media(max-width:900px){
  .layout{grid-template-columns:1fr;max-width:600px;margin:0 auto}
  .left-gap,.right-panel{display:none}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo" onclick="location.href='/home.html'">ETHORIA</div>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Search users..." id="searchInput" oninput="debounceSearch()"/>
  </div>
  <div class="nav-icons">
    <button class="nav-icon" onclick="location.href='/home.html'" title="Home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    </button>
    <button class="nav-icon" onclick="location.href='/explore.html'" title="Explore">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="nav-icon" id="notifBtn" onclick="toggleNotif()" title="Notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="badge" id="notifBadge" style="display:none"></span>
    </button>
    <div class="avatar-btn" onclick="goProfile()" id="navAvatar">
      <img src="" alt="" id="navAvatarImg" onerror="this.style.display='none';this.nextSibling.style.display='flex'" style="display:none"/>
      <div class="avatar-placeholder" id="navAvatarPlaceholder"></div>
    </div>
  </div>
</nav>

<!-- LAYOUT -->
<div class="layout">
  <div class="left-gap"></div>
  <div class="feed">
    <!-- STORIES -->
    <div class="stories-wrap">
      <div class="stories-scroll" id="storiesScroll">
        <div class="story-item" onclick="openCreateStory()">
          <div class="story-ring add-story" style="position:relative">
            <img class="story-avatar" src="" alt="" id="myStoryAvatar" onerror="this.style.display='none'"/>
            <div class="story-add-icon">+</div>
          </div>
          <span class="story-name">Your story</span>
        </div>
      </div>
    </div>

    <!-- POSTS FEED -->
    <div id="postsContainer"><div class="empty-state"><p>Loading your feed...</p></div></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="panel-section" id="profileSection">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;background:var(--border);cursor:pointer" onclick="goProfile()">
          <img id="rpAvatar" src="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"/>
        </div>
        <div>
          <div style="font-weight:600;font-size:.95rem" id="rpUsername">Loading...</div>
          <div style="color:var(--muted);font-size:.8rem" id="rpWelcome">Welcome back 👋</div>
        </div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Suggested for you</div>
      <div id="suggestionsContainer"><div style="color:var(--muted);font-size:.85rem">No suggestions</div></div>
    </div>
    <div style="color:var(--muted2);font-size:.72rem;margin-top:20px">
      About · Help · Privacy · Terms<br>
      <span style="margin-top:4px;display:block">© 2026 ETHORIA</span>
    </div>
  </div>
</div>

<!-- NOTIFICATIONS PANEL -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-header">
    <h3>Notifications</h3>
    <button class="mark-read" onclick="markAllRead()">Mark all read</button>
  </div>
  <div id="notifList"></div>
</div>

<!-- CREATE POST MODAL -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <h3>Create Post</h3>
    <button class="modal-close" onclick="closeModal('postModal')">✕</button>
    <textarea id="postCaption" placeholder="What's on your mind?" maxlength="500" oninput="onCaptionInput()"></textarea>
    <div class="ai-badge" id="aiBadge"></div>
    <div class="img-preview" id="imgPreview"><img id="imgPreviewImg" src="" alt=""/></div>
    <input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="handleImageSelect()"/>
    <div class="modal-actions">
      <button class="img-btn" onclick="document.getElementById('imgFileInput').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,19"/></svg>
        Add Photo
      </button>
      <button class="post-btn" id="submitPostBtn" onclick="submitPost()">Share</button>
    </div>
  </div>
</div>

<!-- CREATE STORY MODAL -->
<div class="modal-overlay" id="storyModal">
  <div class="modal">
    <h3>Add Story</h3>
    <button class="modal-close" onclick="closeModal('storyModal')">✕</button>
    <div class="img-preview open" id="storyImgPreview" style="display:block;min-height:100px;background:#0a0a12;border-radius:12px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem;cursor:pointer" onclick="document.getElementById('storyFileInput').click()">
      <span id="storyImgPlaceholder">Click to select image</span>
      <img id="storyImgImg" src="" style="display:none;width:100%;border-radius:12px"/>
    </div>
    <input type="file" id="storyFileInput" accept="image/*" style="display:none" onchange="handleStoryImage()"/>
    <textarea id="storyText" placeholder="Add a caption..." style="width:100%;background:#0a0a12;border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.95rem;resize:none;outline:none;min-height:60px" maxlength="150"></textarea>
    <div class="modal-actions" style="margin-top:12px">
      <span style="font-size:.8rem;color:var(--muted)">Disappears in 24h</span>
      <button class="post-btn" onclick="submitStory()">Share Story</button>
    </div>
  </div>
</div>

<!-- STORY VIEWER -->
<div class="story-viewer" id="storyViewer">
  <div class="story-progress"><div class="story-progress-fill" id="storyProgressFill"></div></div>
  <button class="story-viewer-close" onclick="closeStoryViewer()">✕</button>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <img src="" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover" id="storyViewerAvatar"/>
    <span style="font-size:.9rem;font-weight:600" id="storyViewerName"></span>
    <span style="font-size:.8rem;color:var(--muted)" id="storyViewerTime"></span>
  </div>
  <img src="" alt="" id="storyViewerImg" style="max-height:75vh;max-width:400px;border-radius:12px"/>
  <p style="margin-top:10px;font-size:.9rem;color:rgba(255,255,255,.8)" id="storyViewerText"></p>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let currentUser = null;
let selectedImageB64 = '';
let selectedStoryB64 = '';
let notifOpen = false;
let searchTimeout = null;
let storyTimer = null;

// --- AUTH ---
function getToken(){return localStorage.getItem('token');}
function authHeaders(){return {'Content-Type':'application/json','Authorization':`Bearer ${getToken()}`};}

async function init(){
  const token = getToken();
  if(!token){window.location.href='/login.html';return;}
  try{
    const r = await fetch(`${API}/api/auth/me`,{headers:authHeaders(),credentials:'include'});
    if(!r.ok){logout();return;}
    currentUser = await r.json();
    renderUserUI();
    loadFeed();
    loadStories();
    loadSuggestions();
    loadUnreadCount();
  }catch(e){logout();}
}

function logout(){
  localStorage.clear();
  window.location.href='/login.html';
}

function renderUserUI(){
  document.getElementById('rpUsername').textContent = currentUser.username;
  document.getElementById('navAvatarPlaceholder').textContent = currentUser.username[0].toUpperCase();
  if(currentUser.avatar){
    document.getElementById('navAvatarImg').src = currentUser.avatar;
    document.getElementById('navAvatarImg').style.display = 'block';
    document.getElementById('navAvatarPlaceholder').style.display = 'none';
    document.getElementById('rpAvatar').src = currentUser.avatar;
    document.getElementById('myStoryAvatar').src = currentUser.avatar;
  }
}

function goProfile(){window.location.href=`/profile.html?user=${currentUser.username}`;}

// --- FEED ---
async function loadFeed(){
  const r = await fetch(`${API}/api/posts/`,{headers:authHeaders(),credentials:'include'});
  const posts = await r.json();
  const container = document.getElementById('postsContainer');
  if(!posts.length){container.innerHTML='<div class="empty-state"><p>Follow people to see their posts here!</p></div>';return;}
  container.innerHTML = posts.map(renderPost).join('');
}

function renderPost(p){
  const avatar = p.author.avatar ? `<img class="post-avatar" src="${p.author.avatar}" onerror="this.outerHTML='<div class=post-avatar style=background:linear-gradient(135deg,#7c3aed,#1d4ed8);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff>${p.author.username[0].toUpperCase()}</div>'">`
    : `<div class="post-avatar" style="background:linear-gradient(135deg,#7c3aed,#1d4ed8);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff">${p.author.username[0].toUpperCase()}</div>`;
  
  const image = p.image_url ? `<img class="post-image" src="${p.image_url}" alt="" loading="lazy"/>` : '';
  
  const comments = p.comments.slice(-2).map(c =>
    `<div class="comment-item">
      <div class="comment-avatar" style="background:linear-gradient(135deg,#7c3aed,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff">${c.username[0].toUpperCase()}</div>
      <div class="comment-body"><strong>${c.username}</strong>${c.text}</div>
    </div>`
  ).join('');

  const savedIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="${p.saved_by&&p.saved_by.includes(currentUser._id)?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
  const likeIcon = p.liked
    ? `<svg class="liked-icon" width="18" height="18" viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

  return `<div class="post-card" id="post-${p._id}">
    <div class="post-header">
      <div class="post-author" onclick="location.href='/profile.html?user=${p.author.username}'">
        ${avatar}
        <div class="post-author-info">
          <div class="post-username">${p.author.username}</div>
          <div class="post-time">${timeAgo(p.created_at)}</div>
        </div>
      </div>
      <button class="post-menu">···</button>
    </div>
    ${image}
    <div class="post-actions">
      <button class="action-btn ${p.liked?'liked':''}" onclick="toggleLike('${p._id}',this)" id="likeBtn-${p._id}">
        ${likeIcon}
        <span id="likesCount-${p._id}">${p.likes}</span>
      </button>
      <button class="action-btn" onclick="focusComment('${p._id}')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>${p.comments.length}</span>
      </button>
      <button class="action-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <button class="action-btn save-btn ${p.saved_by&&p.saved_by.includes(currentUser._id)?'saved':''}" onclick="toggleSave('${p._id}',this)">
        ${savedIcon}
      </button>
    </div>
    <div class="post-meta">
      <div class="likes-count">${p.likes} likes</div>
      ${p.caption ? `<div class="caption"><span onclick="location.href='/profile.html?user=${p.author.username}'">${p.author.username}</span>${p.caption}</div>` : ''}
    </div>
    <div class="comments-section">
      ${p.comments.length > 2 ? `<span class="view-comments">View all ${p.comments.length} comments</span>` : ''}
      ${comments}
    </div>
    <div class="add-comment">
      <input class="comment-input" id="commentInput-${p._id}" placeholder="Add a comment..." oninput="this.nextElementSibling.className='comment-send '+(this.value?'active':'')"/>
      <button class="comment-send" onclick="submitComment('${p._id}')">Post</button>
    </div>
  </div>`;
}

async function toggleLike(postId, btn){
  const r = await fetch(`${API}/api/posts/${postId}/like`,{method:'POST',headers:authHeaders(),credentials:'include'});
  const d = await r.json();
  const likeBtn = document.getElementById(`likeBtn-${postId}`);
  const likeCount = document.getElementById(`likesCount-${postId}`);
  likeCount.textContent = d.likes;
  if(d.liked){
    likeBtn.className = 'action-btn liked';
    likeBtn.querySelector('svg').setAttribute('fill','#ef4444');
    likeBtn.querySelector('svg').setAttribute('stroke','#ef4444');
  } else {
    likeBtn.className = 'action-btn';
    likeBtn.querySelector('svg').setAttribute('fill','none');
    likeBtn.querySelector('svg').setAttribute('stroke','currentColor');
  }
}

async function toggleSave(postId, btn){
  const r = await fetch(`${API}/api/posts/${postId}/save`,{method:'POST',headers:authHeaders(),credentials:'include'});
  const d = await r.json();
  btn.className = 'action-btn save-btn' + (d.saved?' saved':'');
  btn.querySelector('svg').setAttribute('fill', d.saved ? 'currentColor' : 'none');
}

function focusComment(postId){document.getElementById(`commentInput-${postId}`).focus();}

async function submitComment(postId){
  const input = document.getElementById(`commentInput-${postId}`);
  const text = input.value.trim();
  if(!text) return;
  const r = await fetch(`${API}/api/posts/${postId}/comment`,{method:'POST',headers:authHeaders(),credentials:'include',body:JSON.stringify({text})});
  const d = await r.json();
  if(!r.ok){showToast(d.error,'error');return;}
  if(d.warning) showToast('⚠️ Your comment may contain sensitive content.','warn');
  input.value = '';
  input.nextElementSibling.className = 'comment-send';
  // Append comment
  const section = document.querySelector(`#post-${postId} .comments-section`);
  const el = document.createElement('div');
  el.className = 'comment-item';
  el.innerHTML = `<div class="comment-avatar" style="background:linear-gradient(135deg,#7c3aed,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff">${currentUser.username[0].toUpperCase()}</div>
    <div class="comment-body"><strong>${currentUser.username}</strong>${text}</div>`;
  section.appendChild(el);
}

// --- STORIES ---
async function loadStories(){
  try{
    const r = await fetch(`${API}/api/stories/`,{headers:authHeaders(),credentials:'include'});
    const stories = await r.json();
    const scroll = document.getElementById('storiesScroll');
    const existing = scroll.querySelector('.story-item');
    stories.forEach(group => {
      const div = document.createElement('div');
      div.className = 'story-item';
      const seen = group.seen;
      div.innerHTML = `
        <div class="story-ring ${seen?'seen':''}">
          <div class="story-avatar" style="background:linear-gradient(135deg,#7c3aed,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;border:2px solid var(--card);border-radius:50%;width:100%;height:100%">${group.username[0].toUpperCase()}</div>
        </div>
        <span class="story-name">${group.username}</span>`;
      div.onclick = () => viewStory(group);
      scroll.appendChild(div);
    });
  }catch(e){}
}

function viewStory(group){
  const story = group.stories[0];
  document.getElementById('storyViewer').classList.add('open');
  document.getElementById('storyViewerName').textContent = group.username;
  document.getElementById('storyViewerImg').src = story.image_url || '';
  document.getElementById('storyViewerText').textContent = story.text || '';
  document.getElementById('storyViewerImg').style.display = story.image_url ? 'block' : 'none';
  // Reset progress
  const fill = document.getElementById('storyProgressFill');
  fill.style.animation = 'none';
  fill.offsetHeight; // reflow
  fill.style.animation = '';
  if(storyTimer) clearTimeout(storyTimer);
  storyTimer = setTimeout(closeStoryViewer, 5000);
  fetch(`${API}/api/stories/${story._id}/seen`,{method:'POST',headers:authHeaders(),credentials:'include'});
}

function closeStoryViewer(){
  document.getElementById('storyViewer').classList.remove('open');
  if(storyTimer) clearTimeout(storyTimer);
}

// --- CREATE POST ---
function openCreatePost(){document.getElementById('postModal').classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');selectedImageB64='';}

function handleImageSelect(){
  const file = document.getElementById('imgFileInput').files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    selectedImageB64 = e.target.result;
    document.getElementById('imgPreviewImg').src = e.target.result;
    document.getElementById('imgPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

let captionTimer = null;
function onCaptionInput(){
  clearTimeout(captionTimer);
  const badge = document.getElementById('aiBadge');
  badge.className = 'ai-badge';
  captionTimer = setTimeout(async () => {
    const text = document.getElementById('postCaption').value.trim();
    if(!text || text.length < 5) return;
    const r = await fetch(`${API}/api/posts/analyze`,{method:'POST',headers:authHeaders(),credentials:'include',body:JSON.stringify({text})});
    const d = await r.json();
    if(d.action==='warn'){badge.className='ai-badge warn';badge.textContent='⚠️ This may contain sensitive content';}
    else if(d.action==='block'){badge.className='ai-badge block';badge.textContent='🚫 This content will be blocked';}
    else{badge.className='ai-badge';}
  }, 800);
}

async function submitPost(){
  const caption = document.getElementById('postCaption').value.trim();
  const btn = document.getElementById('submitPostBtn');
  if(!caption && !selectedImageB64){showToast('Add a caption or image','error');return;}
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Posting...';
  const body = {caption, image_b64: selectedImageB64};
  const r = await fetch(`${API}/api/posts/`,{method:'POST',headers:authHeaders(),credentials:'include',body:JSON.stringify(body)});
  const d = await r.json();
  btn.disabled = false;
  btn.innerHTML = 'Share';
  if(!r.ok){showToast(d.error || 'Failed to post','error');return;}
  if(d.warning) showToast('⚠️ Your post was shared but may contain sensitive content.','warn');
  else showToast('Posted!','success');
  closeModal('postModal');
  document.getElementById('postCaption').value = '';
  selectedImageB64 = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('aiBadge').className = 'ai-badge';
  // Prepend post
  const container = document.getElementById('postsContainer');
  if(container.querySelector('.empty-state')) container.innerHTML = '';
  container.insertAdjacentHTML('afterbegin', renderPost(d));
}

// --- STORIES CREATE ---
function openCreateStory(){document.getElementById('storyModal').classList.add('open');}

function handleStoryImage(){
  const file = document.getElementById('storyFileInput').files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    selectedStoryB64 = e.target.result;
    document.getElementById('storyImgImg').src = e.target.result;
    document.getElementById('storyImgImg').style.display = 'block';
    document.getElementById('storyImgPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function submitStory(){
  const text = document.getElementById('storyText').value.trim();
  if(!selectedStoryB64 && !text){showToast('Add an image or text','error');return;}
  const r = await fetch(`${API}/api/stories/`,{method:'POST',headers:authHeaders(),credentials:'include',body:JSON.stringify({image_b64:selectedStoryB64,text})});
  if(r.ok){showToast('Story shared!','success');closeModal('storyModal');}
  else showToast('Failed to share story','error');
}

// --- SUGGESTIONS ---
async function loadSuggestions(){
  const r = await fetch(`${API}/api/users/suggestions`,{headers:authHeaders(),credentials:'include'});
  const users = await r.json();
  const el = document.getElementById('suggestionsContainer');
  if(!users.length){el.innerHTML='<div style="color:var(--muted);font-size:.85rem">No suggestions</div>';return;}
  el.innerHTML = users.map(u => `
    <div class="user-card">
      <div class="user-info" onclick="location.href='/profile.html?user=${u.username}'">
        <div class="user-avatar-sm" style="background:linear-gradient(135deg,#7c3aed,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff">${u.username[0].toUpperCase()}</div>
        <div class="user-name-wrap">
          <div class="user-display">${u.username}</div>
          <div class="user-sub">${u.followers_count} followers</div>
        </div>
      </div>
      <button class="follow-btn" id="followBtn-${u._id}" onclick="followUser('${u._id}','${u.username}',this)">${u.is_following?'Following':'Follow'}</button>
    </div>`).join('');
}

async function followUser(userId, username, btn){
  const r = await fetch(`${API}/api/users/${userId}/follow`,{method:'POST',headers:authHeaders(),credentials:'include'});
  const d = await r.json();
  btn.textContent = d.following ? 'Following' : 'Follow';
  btn.className = 'follow-btn' + (d.following?' following':'');
}

// --- NOTIFICATIONS ---
async function loadUnreadCount(){
  const r = await fetch(`${API}/api/notifications/unread-count`,{headers:authHeaders(),credentials:'include'});
  const d = await r.json();
  const badge = document.getElementById('notifBadge');
  if(d.count > 0){badge.style.display='block';}else{badge.style.display='none';}
}

async function toggleNotif(){
  notifOpen = !notifOpen;
  document.getElementById('notifPanel').classList.toggle('open', notifOpen);
  if(notifOpen) loadNotifications();
}

async function loadNotifications(){
  const r = await fetch(`${API}/api/notifications/`,{headers:authHeaders(),credentials:'include'});
  const notifs = await r.json();
  const el = document.getElementById('notifList');
  if(!notifs.length){el.innerHTML='<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:20px 0">No notifications yet</div>';return;}
  el.innerHTML = notifs.map(n => `
    <div class="notif-item">
      <div class="notif-avatar" style="background:linear-gradient(135deg,#7c3aed,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff">${(n.sender_username||'?')[0].toUpperCase()}</div>
      <div class="notif-body">
        <strong>${n.sender_username}</strong> ${n.message.replace(n.sender_username,'').trim()}
        <span class="notif-time">${n.time}</span>
      </div>
      ${!n.read?'<div class="notif-dot"></div>':''}
    </div>`).join('');
}

async function markAllRead(){
  await fetch(`${API}/api/notifications/mark-read`,{method:'POST',headers:authHeaders(),credentials:'include'});
  document.getElementById('notifBadge').style.display='none';
  loadNotifications();
}

// --- SEARCH ---
function debounceSearch(){
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 400);
}

async function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  const r = await fetch(`${API}/api/users/search?q=${encodeURIComponent(q)}`,{headers:authHeaders(),credentials:'include'});
  const users = await r.json();
  if(users.length) location.href = `/profile.html?user=${users[0].username}`;
}

// --- UTILS ---
function timeAgo(iso){
  const d = new Date(iso), now = new Date();
  const diff = Math.floor((now - d)/1000);
  if(diff<60) return 'just now';
  if(diff<3600) return `${Math.floor(diff/60)}m ago`;
  if(diff<86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  setTimeout(() => t.className='toast', 3000);
}

// Click outside notif panel to close
document.addEventListener('click', e => {
  if(notifOpen && !document.getElementById('notifPanel').contains(e.target) && e.target.id !== 'notifBtn' && !document.getElementById('notifBtn').contains(e.target)){
    notifOpen = false;
    document.getElementById('notifPanel').classList.remove('open');
  }
});

// Open post modal on caption input click
document.addEventListener('DOMContentLoaded', () => {
  // Add create post bar dynamically
  const feed = document.getElementById('postsContainer');
  const createDiv = document.createElement('div');
  createDiv.className = 'create-post';
  createDiv.innerHTML = `<div class="create-row">
    <div class="create-avatar"><div style="width:100%;height:100%;background:linear-gradient(135deg,#7c3aed,#1d4ed8);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#fff" id="createAvatarPlaceholder"></div></div>
    <div class="create-input" onclick="openCreatePost()" tabindex="0">What's on your mind?</div>
  </div>`;
  feed.parentNode.insertBefore(createDiv, feed);
});

init();
</script>
</body>
